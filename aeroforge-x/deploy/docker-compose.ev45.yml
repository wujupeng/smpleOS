version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: aeroforge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${PG_PASSWORD:-aeroforge}
      POSTGRES_DB: aeroforge
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations/v2_0/001_aircraft_core_tables.sql:/docker-entrypoint-initdb.d/001_aircraft_core_tables.sql:ro
      - ./migrations/v2_0/002_workflow_engine_tables.sql:/docker-entrypoint-initdb.d/002_workflow_engine_tables.sql:ro
      - ./migrations/v2_0/003_physics_twin_tables.sql:/docker-entrypoint-initdb.d/003_physics_twin_tables.sql:ro
      - ./migrations/v6_0/001_physics_twin_v6_tables.sql:/docker-entrypoint-initdb.d/004_physics_twin_v6_tables.sql:ro
      - ./migrations/v6_0/002_aircraft_core_v6_tables.sql:/docker-entrypoint-initdb.d/005_aircraft_core_v6_tables.sql:ro
      - ./migrations/v6_1/004_v61_physics_twin_tables.sql:/docker-entrypoint-initdb.d/006_v61_physics_twin_tables.sql:ro
      - ./migrations/v6_1/005_v61_aircraft_core_tables.sql:/docker-entrypoint-initdb.d/007_v61_aircraft_core_tables.sql:ro
      - ./migrations/v6_2/006_configuration_uuid_tables.sql:/docker-entrypoint-initdb.d/008_configuration_uuid_tables.sql:ro
      - ./migrations/v6_3/007_optimistic_lock_version.sql:/docker-entrypoint-initdb.d/009_optimistic_lock_version.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aeroforge-net

  nats:
    image: nats:alpine
    container_name: aeroforge-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: --jetstream --store_dir /data -m 8222
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aeroforge-net

  neo4j:
    image: neo4j:5
    container_name: aeroforge-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-aeroforge_neo4j}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - aeroforge-net

  minio:
    image: minio/minio:latest
    container_name: aeroforge-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-aeroforge}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET:-aeroforge123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aeroforge-net

  init-nats:
    image: python:3.12-slim
    container_name: aeroforge-init-nats
    environment:
      NATS_SERVERS: nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - ../scripts/init_nats_streams.py:/init_nats_streams.py:ro
    entrypoint: ["python", "/init_nats_streams.py"]
    restart: "no"
    networks:
      - aeroforge-net

  init-neo4j:
    image: python:3.12-slim
    container_name: aeroforge-init-neo4j
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-aeroforge_neo4j}
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ../scripts/init_neo4j_schema.py:/init_neo4j_schema.py:ro
    entrypoint: ["python", "/init_neo4j_schema.py"]
    restart: "no"
    networks:
      - aeroforge-net

  init-minio:
    image: minio/mc:latest
    container_name: aeroforge-init-minio
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_USER: ${MINIO_USER:-aeroforge}
      MINIO_SECRET: ${MINIO_SECRET:-aeroforge123}
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ../scripts/init_minio_buckets.sh:/init_minio_buckets.sh:ro
    entrypoint: ["sh", "/init_minio_buckets.sh"]
    restart: "no"
    networks:
      - aeroforge-net

  aircraft-core:
    build:
      context: ../services/aircraft-core-service
      dockerfile: Dockerfile
    container_name: aeroforge-aircraft-core
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:${PG_PASSWORD:-aeroforge}@postgres:5432/aeroforge
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:-aeroforge-master-key-32bytes!!}
      NATS_SERVERS: nats://nats:4222
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-aeroforge_neo4j}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-aeroforge}
      MINIO_SECRET_KEY: ${MINIO_SECRET:-aeroforge123}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      init-nats:
        condition: service_completed_successfully
      init-neo4j:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/api/v6/aircraft-core/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aeroforge-net

  workflow-engine:
    build:
      context: ../services/workflow-engine-service
      dockerfile: Dockerfile
    container_name: aeroforge-workflow-engine
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://postgres:${PG_PASSWORD:-aeroforge}@postgres:5432/aeroforge
      NATS_SERVERS: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      init-nats:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/api/v6/workflow-engine/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aeroforge-net

  physics-twin:
    build:
      context: ../services/physics-twin-service
      dockerfile: Dockerfile
    container_name: aeroforge-physics-twin
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://postgres:${PG_PASSWORD:-aeroforge}@postgres:5432/aeroforge
      NATS_SERVERS: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-aeroforge}
      MINIO_SECRET_KEY: ${MINIO_SECRET:-aeroforge123}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      init-nats:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/api/v6/physics-twin/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aeroforge-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: aeroforge-frontend
    ports:
      - "80:80"
    depends_on:
      aircraft-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - aeroforge-net

volumes:
  pg_data:
  neo4j_data:
  nats_data:
  minio_data:

networks:
  aeroforge-net:
    driver: bridge