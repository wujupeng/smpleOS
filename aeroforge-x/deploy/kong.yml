        config:
          minute: 30
          policy: local

  global_plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
      max_age: 3600

  - name: request-termination
    config:
      status_code: 401
      message: '{"code": 401, "message": "Authentication required"}'
