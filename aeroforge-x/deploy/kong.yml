_format_version: "3.0"
_transform: true

services:
  - name: design-center
    url: http://design-center:8000
    routes:
      - name: design-routes
        paths:
          - /api/v1/specs
          - /api/v1/models
          - /api/v1/rules
          - /api/v1/design
        strip_path: false
    plugins:
      - name: jwt
        config:
          uri_param_names:
            - jwt
          claims_to_verify:
            - exp
      - name: rate-limiting
        config:
          minute: 60
          policy: local

  - name: cae-center
    url: http://cae-center:8000
    routes:
      - name: cae-routes
        paths:
          - /api/v1/mesh
          - /api/v1/cfd
          - /api/v1/fea
          - /api/v1/flutter
          - /api/v1/thermal
          - /api/v1/multiphysics
          - /api/v1/cae
        strip_path: false
    plugins:
      - name: jwt
      - name: rate-limiting
        config:
          minute: 30
          policy: local

  - name: digital-twin-center
    url: http://digital-twin-center:8000
    routes:
      - name: twin-routes
        paths:
          - /api/v1/twin
        strip_path: false
