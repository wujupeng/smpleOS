version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aeroforge-postgres
    environment:
      POSTGRES_USER: aeroforge
      POSTGRES_PASSWORD: aeroforge_dev
      POSTGRES_DB: aeroforge_x
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeroforge -d aeroforge_x"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: aeroforge-neo4j
    environment:
      NEO4J_AUTH: neo4j/aeroforge_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 256m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p aeroforge_dev 'RETURN 1'"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: aeroforge-minio
    environment:
      MINIO_ROOT_USER: aeroforge_minio
      MINIO_ROOT_PASSWORD: aeroforge_minio_secret
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aeroforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: aeroforge-nats
    command: "--jetstream --store_dir /data"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: aeroforge-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: aeroforge_x
      KC_DB_USERNAME: aeroforge
      KC_DB_PASSWORD: aeroforge_dev
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  celery-worker-cfd:
    image: aeroforge-cae-center:latest
    container_name: aeroforge-celery-cfd
    build:
      context: ../services/cae-center
      dockerfile: Dockerfile
    command: celery -A cae_center.src.infrastructure.celery_tasks.celery_app:celery_app worker -Q cfd,urgent --loglevel=info --concurrency=2
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker-fea:
    image: aeroforge-cae-center:latest
    container_name: aeroforge-celery-fea
    build:
      context: ../services/cae-center
      dockerfile: Dockerfile
    command: celery -A cae_center.src.infrastructure.celery_tasks.celery_app:celery_app worker -Q fea,urgent --loglevel=info --concurrency=2
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker-flutter:
    image: aeroforge-cae-center:latest
    container_name: aeroforge-celery-flutter
    build:
      context: ../services/cae-center
      dockerfile: Dockerfile
    command: celery -A cae_center.src.infrastructure.celery_tasks.celery_app:celery_app worker -Q flutter,urgent --loglevel=info --concurrency=1
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker-thermal:
    image: aeroforge-cae-center:latest
    container_name: aeroforge-celery-thermal
    build:
      context: ../services/cae-center
      dockerfile: Dockerfile
    command: celery -A cae_center.src.infrastructure.celery_tasks.celery_app:celery_app worker -Q thermal,urgent --loglevel=info --concurrency=2
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker-multiphysics:
    image: aeroforge-cae-center:latest
    container_name: aeroforge-celery-multiphysics
    build:
      context: ../services/cae-center
      dockerfile: Dockerfile
    command: celery -A cae_center.src.infrastructure.celery_tasks.celery_app:celery_app worker -Q multiphysics,urgent --loglevel=info --concurrency=1
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-flower:
    image: mher/flower:0.9.7
    container_name: aeroforge-flower
    command: --broker=redis://redis:6379/0 --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:2.14-pg16
    container_name: aeroforge-timescaledb
    environment:
      POSTGRES_USER: aeroforge
      POSTGRES_PASSWORD: aeroforge_dev
      POSTGRES_DB: aeroforge_ts
    ports:
      - "5433:5432"
    volumes:
      - ts-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeroforge -d aeroforge_ts"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong:
    image: kong:3.6-alpine
    container_name: aeroforge-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    volumes:
      - ./kong.yml:/etc/kong/kong.yml:ro
    restart: unless-stopped

  design-center:
    image: aeroforge-design-center:latest
    container_name: aeroforge-design-center
    build:
      context: ../services/design-center
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://aeroforge:aeroforge_dev@postgres:5432/aeroforge_x
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cae-center:
    image: aeroforge-cae-center:latest
    container_name: aeroforge-cae-center
    build:
      context: ../services/cae-center
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql://aeroforge:aeroforge_dev@postgres:5432/aeroforge_x
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: aeroforge_minio
      MINIO_SECRET_KEY: aeroforge_minio_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  digital-twin-center:
    image: aeroforge-digital-twin-center:latest
    container_name: aeroforge-digital-twin-center
    build:
      context: ../services/digital-twin-center
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql://aeroforge:aeroforge_dev@postgres:5432/aeroforge_x
      TIMESCALE_URL: postgresql://aeroforge:aeroforge_dev@timescaledb:5432/aeroforge_ts
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: aeroforge_dev
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  bom-center:
    image: aeroforge-bom-center:latest
    container_name: aeroforge-bom-center
    build:
      context: ../services/bom-center
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    environment:
      DATABASE_URL: postgresql://aeroforge:aeroforge_dev@postgres:5432/aeroforge_x
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: aeroforge_dev
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  plm-center:
    image: aeroforge-plm-center:latest
    container_name: aeroforge-plm-center
    build:
      context: ../services/plm-center
      dockerfile: Dockerfile
    ports:
