    container_name: aeroforge-supply-chain
    build:
      context: ../services/supply-chain
      dockerfile: Dockerfile
    ports:
      - "8008:8000"
    environment:
      DATABASE_URL: postgresql://aeroforge:aeroforge_dev@postgres:5432/aeroforge_x
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  delivery-center:
    image: aeroforge-delivery-center:latest
    container_name: aeroforge-delivery-center
    build:
      context: ../services/delivery-center
      dockerfile: Dockerfile
    ports:
      - "8009:8000"
    environment:
      DATABASE_URL: postgresql://aeroforge:aeroforge_dev@postgres:5432/aeroforge_x
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: aeroforge_minio
      MINIO_SECRET_KEY: aeroforge_minio_secret
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  certification-center:
    image: aeroforge-certification-center:latest
    container_name: aeroforge-certification-center
    build:
      context: ../services/certification-center
      dockerfile: Dockerfile
    ports:
      - "8010:8000"
    environment:
      DATABASE_URL: postgresql://aeroforge:aeroforge_dev@postgres:5432/aeroforge_x
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  knowledge-center:
    image: aeroforge-knowledge-center:latest
    container_name: aeroforge-knowledge-center
    build:
      context: ../services/knowledge-center
      dockerfile: Dockerfile
    ports:
      - "8011:8000"
    environment:
      DATABASE_URL: postgresql://aeroforge:aeroforge_dev@postgres:5432/aeroforge_x
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: aeroforge_dev
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  platform-ecosystem:
    image: aeroforge-platform-ecosystem:latest
    container_name: aeroforge-platform-ecosystem
    build:
      context: ../services/platform-ecosystem
      dockerfile: Dockerfile
    ports:
      - "8012:8000"
    environment:
      DATABASE_URL: postgresql://aeroforge:aeroforge_dev@postgres:5432/aeroforge_x
      REDIS_URL: redis://redis:6379/0
