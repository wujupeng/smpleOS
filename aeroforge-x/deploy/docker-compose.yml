      postgres:
        condition: service_healthy
    restart: unless-stopped

  data-lake:
    image: aeroforge-data-lake:latest
    container_name: aeroforge-data-lake
    build:
      context: ../services/data-lake
      dockerfile: Dockerfile
    ports:
      - "8013:8000"
    environment:
      DATABASE_URL: postgresql://aeroforge:aeroforge_dev@postgres:5432/aeroforge_x
      TIMESCALE_URL: postgresql://aeroforge:aeroforge_dev@timescaledb:5432/aeroforge_ts
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: aeroforge_minio
      MINIO_SECRET_KEY: aeroforge_minio_secret
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  qms-service:
    image: aeroforge-qms-service:latest
    container_name: aeroforge-qms-service
    build:
      context: ../services/qms-service
      dockerfile: Dockerfile
    ports:
      - "8014:8000"
    environment:
      DATABASE_URL: postgresql://aeroforge:aeroforge_dev@postgres:5432/aeroforge_x
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  trace-service:
    image: aeroforge-trace-service:latest
    container_name: aeroforge-trace-service
    build:
      context: ../services/trace-service
      dockerfile: Dockerfile
    ports:
      - "8015:8000"
    environment:
      DATABASE_URL: postgresql://aeroforge:aeroforge_dev@postgres:5432/aeroforge_x
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: aeroforge-frontend:latest
    container_name: aeroforge-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - kong
    restart: unless-stopped

volumes:
  pg-data:
  neo4j-data:
  minio-data:
  redis-data:
  nats-data:
  ts-data: