{{- if .Values.celeryWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: {{ .Release.Namespace }}
  labels:
    app: celery-worker
spec:
  replicas: {{ .Values.celeryWorker.replicas }}
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.celeryWorker.image.repository }}:{{ .Values.celeryWorker.image.tag }}"
          command: ["celery", "-A", "celery_app", "worker"]
          args:
            - "--concurrency={{ .Values.celeryWorker.concurrency }}"
            - "--queues={{ .Values.celeryWorker.queues }}"
            - "--loglevel={{ .Values.config.logLevel }}"
          env:
            - name: CELERY_BROKER_URL
              value: {{ .Values.config.celeryBrokerUrl }}
            - name: CELERY_RESULT_BACKEND
              value: {{ .Values.config.celeryResultBackend }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aeroforge-secrets
                  key: database-url
          resources:
            {{- toYaml .Values.celeryWorker.resources | nindent 12 }}
{{- if .Values.celeryWorker.hpa }}
{{- if .Values.celeryWorker.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: celery-worker-hpa
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: celery-worker
  minReplicas: {{ .Values.celeryWorker.hpa.minReplicas }}
  maxReplicas: {{ .Values.celeryWorker.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.celeryWorker.hpa.targetCPUUtilization }}
{{- end }}
{{- end }}
{{- end }}