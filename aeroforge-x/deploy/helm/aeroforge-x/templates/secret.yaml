apiVersion: v1
kind: Secret
metadata:
  name: aeroforge-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  database-url: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password | default "changeme" }}@postgresql-primary:5432/{{ .Values.postgresql.auth.database }}"
  neo4j-uri: "bolt://neo4j:7687"
  neo4j-username: "neo4j"
  neo4j-password: {{ .Values.neo4j.auth.password | default "changeme" | quote }}
  minio-access-key: {{ .Values.minio.auth.rootUser | default "changeme" | quote }}
  minio-secret-key: {{ .Values.minio.auth.rootPassword | default "changeme" | quote }}
  keycloak-admin-user: "admin"
  keycloak-admin-password: {{ .Values.keycloak.auth.adminPassword | default "changeme" | quote }}